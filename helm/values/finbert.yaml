replicaCount: 1
image:
  repository: 710220507619.dkr.ecr.us-east-1.amazonaws.com/trading-engine-dev-finbert
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: 2000m
    memory: 2048 Mi

env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      secretKeyRef:
        name: kafka-credentials
        key: bootstrap-servers
  - name: CLICKHOUSE_HOST
    valueFrom:
      secretKeyRef:
        name: clickhouse-credentials
        key: host
  - name: CLICKHOUSE_PORT
    valueFrom:
      secretKeyRef:
        name: clickhouse-credentials
        key: port
  - name: KAFKA_GROUP_ID
    value: "finbert-consumer-group"
  - name: MODEL_NAME
    value: "ProsusAI/finbert"
  - name: SENTIMENT_THRESHOLD
    value: "0.3"

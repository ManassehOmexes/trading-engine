replicaCount: 1
image:
  repository: 710220507619.dkr.ecr.us-east-1.amazonaws.com/trading-engine-dev-risk-manager
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 125m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      secretKeyRef:
        name: kafka-credentials
        key: bootstrap-servers
  - name: KAFKA_GROUP_ID
    value: "risk-manager-group"
  - name: MAX_POSITION_PCT
    value: "0.05"
  - name: MAX_PORTFOLIO_RISK
    value: "0.20"
  - name: ATR_MULTIPLIER
    value: "2.0"
  - name: TOTAL_CAPITAL
    value: "10000.0"

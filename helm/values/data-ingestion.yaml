replicaCount: 1
image:
  repository: 710220507619.dkr.ecr.us-east-1.amazonaws.com/trading-engine-dev-data-ingestion
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: ALPACA_API_KEY
    valueFrom:
      secretKeyRef:
        name: alpaca-credentials
        key: api-key
  - name: ALPACA_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: alpaca-credentials
        key: secret-key
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      secretKeyRef:
        name: kafka-credentials
        key: bootstrap-servers
  - name: SYMBOLS
    value: "AAPL,MSFT,GOOGL,AMZN,NVDA"

vault:
  enabled: false          # true wenn Vault deployed ist
  address: "http://vault.trading-engine.internal:8200"
  role: "trading-engine-role"

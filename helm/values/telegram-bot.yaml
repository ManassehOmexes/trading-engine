replicaCount: 1
image:
  repository: 710220507619.dkr.ecr.us-east-1.amazonaws.com/trading-engine-dev-telegram-bot
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 125m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  - name: TELEGRAM_TOKEN
    valueFrom:
      secretKeyRef:
        name: telegram-credentials
        key: token
  - name: TELEGRAM_CHAT_ID
    valueFrom:
      secretKeyRef:
        name: telegram-credentials
        key: chat-id
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      secretKeyRef:
        name: kafka-credentials
        key: bootstrap-servers
  - name: KAFKA_GROUP_ID
    value: "telegram-bot-group"
  - name: APPROVE_TIMEOUT_SECONDS
    value: "300"

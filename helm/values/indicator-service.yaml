replicaCount: 1
image:
  repository: 710220507619.dkr.ecr.us-east-1.amazonaws.com/trading-engine-dev-indicator-service
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      secretKeyRef:
        name: kafka-credentials
        key: bootstrap-servers
  - name: CLICKHOUSE_HOST
    valueFrom:
      secretKeyRef:
        name: clickhouse-credentials
        key: host
  - name: CLICKHOUSE_PORT
    valueFrom:
      secretKeyRef:
        name: clickhouse-credentials
        key: port
  - name: KAFKA_GROUP_ID
    value: "indicator-consumer-group"
  - name: RSI_PERIOD
    value: "14"
  - name: MIN_BARS
    value: "30"

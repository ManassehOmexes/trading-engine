name: Build Signal Aggregator

on:
  push:
    paths:
      - 'src/signal-aggregator/**'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names trading-engine/signal-aggregator \
            --region us-east-1 || \
          aws ecr create-repository \
            --repository-name trading-engine/signal-aggregator \
            --region us-east-1

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/trading-engine/signal-aggregator:$IMAGE_TAG \
            -t $ECR_REGISTRY/trading-engine/signal-aggregator:latest \
            src/signal-aggregator/
          docker push $ECR_REGISTRY/trading-engine/signal-aggregator:$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-engine/signal-aggregator:latest

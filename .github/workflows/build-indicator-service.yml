name: Build Indicator Service

on:
  push:
    branches: [ main ]
    paths:
      - 'src/indicator-service/**'
      - '.github/workflows/build-indicator-service.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: trading-engine-dev-indicator-service
  SERVICE_PATH: src/indicator-service

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Check if ECR Repository exists
        id: ecr-check
        run: |
          if aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ECR Repository nicht gefunden. Infrastruktur noch nicht deployed."
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        if: steps.ecr-check.outputs.exists == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Image
        if: steps.ecr-check.outputs.exists == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       ${{ env.SERVICE_PATH }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
